name: Deploy to Cloudflare Workers

on:
  push:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: deploy
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      PNPM_CONFIG_TRUST_LOCKFILE: "true"
    steps:
      - uses: actions/checkout@v4
      # wrangler-action が package.json の packageManager (pnpm) を検出して
      # pnpm で wrangler を入れるため、PATH に pnpm を用意しておく
      - uses: pnpm/action-setup@v4
      - uses: voidzero-dev/setup-vp@v1
        with:
          node-version-file: .node-version
          cache: true
      - run: vp build
      # 事前に GitHub Secrets へ以下を登録する:
      #   CLOUDFLARE_API_TOKEN  (Workers 編集権限のある API トークン)
      #   CLOUDFLARE_ACCOUNT_ID
      #   ANTHROPIC_API_KEY     (Worker のシークレットとして同期される)
      - uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: deploy
          secrets: |
            ANTHROPIC_API_KEY
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
